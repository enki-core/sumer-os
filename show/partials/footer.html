<script>
// ── BACKGROUND NEURAL CANVAS ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, nodes = [], bgRaf;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
function initNodes(){nodes=[];const c=Math.floor(W*H/22000);for(let i=0;i<c;i++)nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*2+1,pulse:Math.random()*Math.PI*2});}
function drawBg(){ctx.clearRect(0,0,W,H);nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.pulse+=0.02;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;});for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<120){ctx.strokeStyle=`rgba(0,212,255,${(1-d/120)*0.12})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}}nodes.forEach(n=>{const g=(Math.sin(n.pulse)+1)*0.5;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,212,255,${0.15+g*0.25})`;ctx.fill();});bgRaf=requestAnimationFrame(drawBg);}
resize();initNodes();drawBg();window.addEventListener('resize',()=>{resize();initNodes();});

// ── NAV DOTS ──
const allSections=document.querySelectorAll('section');
const navDotsEl=document.getElementById('navDots');
allSections.forEach((_,i)=>{const d=document.createElement('button');d.className='nav-dot'+(i===0?' active':'');d.onclick=()=>allSections[i].scrollIntoView({behavior:'smooth'});navDotsEl.appendChild(d);});

const totalSlides=allSections.length;
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');const idx=Array.from(allSections).indexOf(e.target);document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));}});},{threshold:0.15});
allSections.forEach(s=>obs.observe(s));

// SHOW MODE — AUTO START
let showActive=false,currentSlide=0,slideDelay=15,timerPaused=false;
let rafTimer=null,timerStart=null,elapsed=0;
const showBar=document.getElementById('showBar');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const timerRing=document.getElementById('timerRing');
const timerIcon=document.getElementById('timerIcon');
const timerFill=document.getElementById('timerRingFill');
const exitBtn=document.getElementById('exitBtn');
const showProgress=document.getElementById('showProgress');
const CIRC=99.9;

function setRingProgress(pct){timerFill.style.strokeDashoffset=CIRC-(pct/100)*CIRC;}
function startShow(){showActive=true;currentSlide=0;timerPaused=false;document.body.classList.add('show-mode');showBar.style.display='flex';allSections.forEach(s=>s.classList.remove('show-active','show-exit','visible'));goToSlide(0);startAutoTimer();}
function goToSlide(idx){const prev=currentSlide;currentSlide=Math.max(0,Math.min(idx,totalSlides-1));allSections.forEach((s,i)=>{if(i===currentSlide){s.classList.add('show-active','visible');s.classList.remove('show-exit');}else if(i===prev&&prev!==currentSlide){s.classList.remove('show-active');s.classList.add('show-exit');setTimeout(()=>s.classList.remove('show-exit'),700);}else{s.classList.remove('show-active','show-exit');}});showProgress.textContent=(currentSlide+1)+' / '+totalSlides;document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===currentSlide));resetTimer();}
function nextSlide(){goToSlide(currentSlide<totalSlides-1?currentSlide+1:0);}
function prevSlide(){if(currentSlide>0)goToSlide(currentSlide-1);}
function resetTimer(){cancelAnimationFrame(rafTimer);elapsed=0;timerStart=performance.now();setRingProgress(0);if(!timerPaused)animTimer();}
function animTimer(){if(!showActive||timerPaused)return;const now=performance.now();elapsed=now-timerStart;const pct=Math.min((elapsed/(slideDelay*1000))*100,100);setRingProgress(pct);if(pct>=100){nextSlide();}else{rafTimer=requestAnimationFrame(animTimer);}}
function startAutoTimer(){resetTimer();}
function stopAutoTimer(){cancelAnimationFrame(rafTimer);rafTimer=null;}
timerRing.addEventListener('click',()=>{timerPaused=!timerPaused;timerRing.classList.toggle('paused',timerPaused);timerIcon.textContent=timerPaused?'▶':'⏸';if(!timerPaused){timerStart=performance.now()-elapsed;animTimer();}});
prevBtn.addEventListener('click',()=>prevSlide());
nextBtn.addEventListener('click',()=>nextSlide());
exitBtn.addEventListener('click',exitShow);
function exitShow(){showActive=false;stopAutoTimer();timerPaused=false;timerRing.classList.remove('paused');timerIcon.textContent='⏸';setRingProgress(0);document.body.classList.remove('show-mode');showBar.style.display='none';allSections.forEach(s=>s.classList.remove('show-active','show-exit'));allSections[currentSlide].scrollIntoView({behavior:'instant'});}
document.addEventListener('keydown',e=>{if(!showActive)return;if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();nextSlide();}else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();prevSlide();}else if(e.key==='Escape'){exitShow();}else if(e.key===' '){e.preventDefault();timerRing.click();}});
window.addEventListener('load',()=>{setTimeout(startShow,800);});
</script>
</body>
</html>
